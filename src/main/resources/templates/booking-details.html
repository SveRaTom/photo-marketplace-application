<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Booking Details')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="details-card booking-details-card">

        <div class="details-header">
            <h1>Booking Details</h1>

            <span th:class="'status-badge status-' + ${#strings.toLowerCase(booking.status.name())}"
                  th:text="${booking.status}"></span>
        </div>

        <div class="details-content">
            <div class="detail-row">
                <strong>Offer:</strong>
                <span th:text="${booking.offer.title}"></span>
            </div>

            <div class="detail-row">
                <strong>Photographer:</strong>
                <span th:text="${booking.offer.photographer.displayName}"></span>
            </div>

            <div class="detail-row">
                <strong>Client:</strong>
                <span th:text="${booking.client.displayName}"></span>
            </div>

            <div class="detail-row">
                <strong>Event Date:</strong>
                <span th:text="${#temporals.format(booking.eventDate, 'dd MMM yyyy')}"></span>
            </div>

            <div class="detail-row">
                <strong>Location:</strong>
                <span th:text="${booking.location}"></span>
            </div>

            <div class="detail-row">
                <strong>Created On:</strong>
                <span th:text="${#temporals.format(booking.createdAt, 'dd MMM yyyy HH:mm')}"></span>
            </div>

            <div class="detail-column">
                <strong>Additional Requirements:</strong>
                <div class="notes-box" th:text="${booking.notes}">Outdoor ceremony and reception photography.</div>
            </div>
        </div>

        <div class="details-actions">
            <div class="details-actions-left">
                <a th:href="@{/bookings}" class="btn btn-secondary">Back</a>
                <a th:if="${booking.canEdit}" th:href="@{/bookings/edit/{id}(id=${booking.id})}"
                   class="btn btn-warning">Edit Booking</a>
                <a th:if="${booking.canReview}" th:href="@{/reviews/create/{bookingId}(bookingId=${booking.id})}"
                   class="btn btn-success">Leave Review</a>
                <a th:if="${booking.review != null}" th:href="@{/reviews/{id}(id=${booking.review.id}, from='booking-details')}"
                   class="btn btn-secondary">View Review</a>
                <form th:if="${booking.canApprove}" th:action="@{/bookings/{id}/approve(id=${booking.id})}"
                      th:method="post">
                    <button type="submit" class="btn btn-success">Approve Booking</button>
                </form>
            </div>

            <div class="details-actions-right">
                <form th:if="${booking.canCancel}" th:action="@{/bookings/delete/{id}(id=${booking.id})}"
                      th:method="post">
                    <button type="submit" class="btn btn-danger"
                            data-confirm-title="Cancel this booking?"
                            data-confirm-message="This booking will remain visible in your booking history with cancelled status."
                            data-confirm-confirm-label="Cancel Booking">Cancel Booking
                    </button>
                </form>

                <form th:if="${booking.canReject}" th:action="@{/bookings/{id}/reject(id=${booking.id})}"
                      th:method="post">
                    <button type="submit" class="btn btn-danger">Reject Booking</button>
                </form>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
