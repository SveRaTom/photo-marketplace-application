<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Edit Review')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
  <section class="form-container">

    <h1>Edit Review</h1>

    <form th:action="@{/reviews/edit/{id}(id=${reviewId})}" th:object="${reviewRequestDTO}" th:method="post">
      <div class="form-group">
        <label for="rating">Rating</label>
        <select id="rating" th:field="*{rating}">
          <option value="1">★☆☆☆☆</option>
          <option value="2">★★☆☆☆</option>
          <option value="3">★★★☆☆</option>
          <option value="4">★★★★☆</option>
          <option value="5">★★★★★</option>
        </select>
      </div>

      <div class="form-group">
        <label for="comment">Review</label>
        <textarea id="comment" rows="6" th:field="*{comment}"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{/profile}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
