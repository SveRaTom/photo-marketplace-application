<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Dashboard')}"></head>
    <title>Dashboard</title>
<body>

<header th:replace="~{fragments/header :: header}"></header>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container">

    <section class="page-header">
        <h1>Dashboard</h1>
        <p>Welcome back, <span th:text="${user.firstName}"></span>!</p>
    </section>

    <section class="dashboard-stats">
        <div class="stat-card">
            <h3>Total Offers</h3>
            <div class="stat-number" th:text="${totalOffers}"></div>
        </div>
        <div class="stat-card">
            <h3>Total Bookings</h3>
            <div class="stat-number" th:text="${totalBookings}"></div>
        </div>
        <div class="stat-card">
            <h3>Completed Bookings</h3>
            <div class="stat-number" th:text="${completedBookings}"></div>
        </div>
        <div class="stat-card">
            <h3>Average Rating</h3>
            <div class="stat-number" th:text="${averageRating}"></div>
        </div>
    </section>

    <section class="dashboard-grid">
        <div class="dashboard-widget">

            <div class="widget-header">
                <h2>Recent Bookings</h2>
            </div>

            <table class="dashboard-table">
                <thead>
                <tr>
                    <th>Client</th>
                    <th>Offer</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${recentBookings}">
                    <td th:text="${booking.client.firstName + ' ' + booking.client.lastName}"></td>
                    <td th:text="${booking.offer.title}"></td>
                    <td>
                        <span class="badge" th:text="${booking.status}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="dashboard-widget">
            <div class="widget-header">
                <h2>Recent Reviews</h2>
            </div>
            <div class="review-widget" th:each="review : ${recentReviews}">
                <h4 th:text="${review.author.firstName + ' ' + review.author.lastName}"></h4>
                <p th:text="${review.comment}"></p>
                <span class="rating" th:text="${review.rating + '/5'}"></span>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
