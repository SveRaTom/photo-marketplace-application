<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Add Photo')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="form-container photo-form-container">
        <h1>Add Photo</h1>
        <p class="form-intro" th:text="${'Add a portfolio photo to ' + offer.title + '.'}"></p>

        <form th:action="@{/photos/create/{offerId}(offerId=${offerId}, from=${from})}" th:object="${photoRequestDTO}"
              th:method="post">
            <div class="form-group">
                <label for="title">Photo Title</label>
                <input id="title" type="text" class="form-control" th:field="*{title}"
                       placeholder="Title">
                <small class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
            </div>

            <div class="form-group">
                <label for="imageUrl">Photo URL</label>
                <input id="imageUrl" type="url" class="form-control" th:field="*{imageUrl}"
                       placeholder="URL" required>
                <small class="error" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></small>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" class="form-control review-textarea" rows="6"
                          th:field="*{description}" placeholder="Short context for this photo"></textarea>
                <small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
            </div>

            <div class="form-check">
                <input id="coverPhoto" type="checkbox" th:field="*{coverPhoto}">
                <label for="coverPhoto">Use as offer cover photo</label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Photo</button>
                <a th:href="${cancelUrl}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
