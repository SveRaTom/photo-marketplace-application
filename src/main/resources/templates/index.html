<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header-public :: head('LensMarket')}"></head>
    <title>LensMarket</title>
<body>

<div th:replace="~{fragments/header-public :: header}"></div>

<section class="hero">
    <div class="container hero-content">
        <h1>Welcome to LensMarket</h1>
        <p>Join photographers and clients to create amazing visual memories.</p>
        <a th:href="@{/login}" class="btn">Get Started</a>
    </div>
</section>

<section class="features">
    <div class="container">
        <div class="feature-grid">
            <div class="feature-card">
                <h3>Wedding Photography</h3>
                <p>Capture unforgettable moments.</p>
            </div>
            <div class="feature-card">
                <h3>Portrait Sessions</h3>
                <p>Professional personal photography.</p>
            </div>
            <div class="feature-card">
                <h3>Event Coverage</h3>
                <p>Corporate and private events.</p>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
