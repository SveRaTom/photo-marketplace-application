<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Edit Booking')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="form-container">

        <h1>Edit Booking</h1>

        <form th:action="@{/bookings/edit/{id}(id=${bookingId})}" th:object="${bookingRequestDTO}" th:method="post">
            <div class="form-group">
                <label for="eventDate">Event Date</label>
                <input id="eventDate" class="form-control" type="date" th:field="*{eventDate}">
                <small class="error" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></small>
            </div>

            <div class="form-group">
                <label for="location">Event Location</label>
                <input id="location" class="form-control" type="text" th:field="*{location}">
                <small class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></small>
            </div>

            <div class="form-group">
                <label for="notes">Additional Requirements</label>
                <textarea id="notes" class="form-control" rows="6" th:field="*{notes}"></textarea>
                <small class="error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/bookings/{id}(id=${bookingId})}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
