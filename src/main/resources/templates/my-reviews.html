<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('My Reviews')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="page-header">
        <div>
            <h1>My Reviews</h1>
            <p>Manage reviews you've submitted for photographers.</p>
        </div>
    </section>

    <section th:if="${!#lists.isEmpty(reviews)}" class="reviews-container">
        <div class="review-card" th:each="review : ${reviews}">
            <div class="review-top">
                <div>
                    <h3 th:text="${review.author.firstName + ' ' + review.author.lastName}"></h3>
                    <p class="review-offer" th:text="${review.offerTitle}"></p>
                </div>
                <div class="rating-badge">
                    <span th:text="${review.rating}"></span>/5 ★
                </div>
            </div>
            <div class="review-content">
                <p th:text="${review.comment}"></p>
            </div>
            <div class="review-footer">
                <span class="review-date" th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}"></span>
            </div>
            <div class="review-actions">
                <a th:href="@{/reviews/edit/{id}(id=${review.id})}" class="btn btn-warning">Edit</a>
                <form th:action="@{/reviews/delete/{id}(id=${review.id})}" th:method="post">
                    <button type="submit" class="btn btn-danger"
                            data-confirm-message="Are you sure you want to delete this review?">Delete
                    </button>
                </form>
            </div>
        </div>
    </section>

    <section th:if="${#lists.isEmpty(reviews)}" class="empty-state">
        <h2>No Reviews Yet</h2>
        <p>You haven't submitted any reviews yet.</p>
        <a th:href="@{/offers}" class="btn btn-primary">Explore Offers</a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
