<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header-public :: head('Login')}"></head>
    <title>Login</title>
<body>

<div th:replace="~{fragments/header-public :: header}"></div>

<section class="auth-section">
    <div class="auth-card">

        <h2>Login</h2>
        <p class="error" th:if="${loginError}" th:text="${loginError}"></p>

        <form th:action="@{/login}" th:object="${userLoginRequest}" th:method="post" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" placeholder="Email" id="email" th:field="*{email}" required>
                <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" placeholder="Password" id="password" th:field="*{password}" required>
                <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

            <button class="btn-primary" type="submit">Login</button>

            <p class="form-already">Don't have an account? <a href="/register">Register now</a>!</p>
        </form>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
