<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Page Not Found')}"></head>

<body>

<main class="error-page">
    <div class="error-container">
        <p class="error-code">404</p>
        <h1>Page not found</h1>
        <p class="error-message">
            The page you requested may have been moved, deleted, or the link may be incorrect.
        </p>

        <div class="error-actions">
            <a th:href="@{/home}" class="btn btn-primary">Return Home</a>
            <a th:href="@{/offers}" class="btn btn-secondary">Browse Offers</a>
        </div>
    </div>
</main>

</body>
</html>
