<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('My Bookings')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="page-header">
        <h1>My Bookings</h1>
    </section>

    <section class="offers-grid">
        <div class="offer-card" th:each="booking : ${bookings}">
            <div class="offer-card-content">
                <h2 th:text="${booking.offerTitle}"></h2>
                <p>
                    Photographer:
                    <strong th:text="${booking.photographerName}"></strong>
                </p>
                <p>
                    Event Date:
                    <strong th:text="${booking.eventDate}"></strong>
                </p>
                <p>
                    Status:
                    <span th:text="${booking.status}"></span>
                </p>
            </div>

            <div class="offer-actions">
                <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-secondary">Details</a>
                <a th:if="${booking.status.name() == 'PENDING'}" th:href="@{/bookings/edit/{id}(id=${booking.id})}"
                   class="btn btn-warning">Edit</a>

                <form th:if="${booking.status.name() == 'PENDING'}"
                      th:action="@{/bookings/delete/{id}(id=${booking.id})}" th:method="post">
                    <button type="submit" class="btn btn-danger"
                            data-confirm-message="Cancel this booking?">
                        Cancel
                    </button>
                </form>
            </div>
        </div>
    </section>

    <section th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        <h2>No Bookings Yet</h2>

        <p>Browse photography offers and make your first booking.</p>
        <a th:href="@{/offers}" class="btn btn-primary">Explore Offers</a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
