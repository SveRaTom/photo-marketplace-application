<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header-public :: head('Register')}"></head>
    <title>Register</title>
<body>

<div th:replace="~{fragments/header-public :: header}"></div>

<section class="auth-section">
    <div class="auth-card">

        <h2>Create Account</h2>

        <form th:action="@{/register}" th:object="${userRegisterRequest}" th:method="post" novalidate>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" placeholder="Username" id="username" th:field="*{username}" required>
                <p class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" placeholder="Email" id="email" th:field="*{email}" required>
                <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" placeholder="Password" id="password" th:field="*{password}" required>
                <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <div class="select-wrapper">
                    <select id="role" class="form-control select-pretty" th:field="*{role}">
                        <option th:each="role : ${T(photomarketplace.model.entity.user.UserRole).values()}"
                                th:value="${role}"
                                th:text="${role}">
                        </option>
                    </select>
                </div>
                <p class="error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></p>
            </div>

            <button class="btn-primary" type="submit">Register</button>
            <p class="form-already">Already have an account? <a href="/login">Login</a>!</p>
        </form>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
