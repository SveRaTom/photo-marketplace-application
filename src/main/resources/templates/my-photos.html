<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('My Photos')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="page-header">
        <div>
            <h1>My Photos</h1>
            <p>Portfolio photos connected to your photography offers.</p>
        </div>
        <a th:href="@{/my-offers}" class="btn btn-primary">Choose Offer</a>
    </section>

    <section class="photos-grid" th:if="${!#lists.isEmpty(photos)}">
        <article class="photo-card" th:each="photo : ${photos}">
            <a th:href="@{/photos/{id}(id=${photo.id}, from='portfolio')}" class="photo-card-image-link">
                <img th:src="${photo.imageUrl}" referrerpolicy="no-referrer" alt="Portfolio Photo">
            </a>

            <div class="photo-card-content">
                <div class="photo-card-header">
                    <h2 th:text="${photo.title != null ? photo.title : 'Untitled Photo'}"></h2>
                    <span th:if="${photo.coverPhoto}" class="cover-badge">Cover</span>
                </div>

                <p class="photo-offer" th:text="${photo.offer.title}"></p>
                <p th:if="${photo.description != null}" class="photo-description" th:text="${photo.description}"></p>
            </div>

            <div class="offer-actions">
                <a th:href="@{/photos/{id}(id=${photo.id}, from='portfolio')}" class="btn btn-primary">Details</a>
                <a th:if="${photo.canEdit}" th:href="@{/photos/edit/{id}(id=${photo.id})}" class="btn btn-warning">Edit</a>

                <form th:if="${photo.canDelete}" class="danger-action"
                      th:action="@{/photos/delete/{id}(id=${photo.id})}" th:method="post">
                    <button type="submit" class="btn btn-danger"
                            data-confirm-title="Delete this photo?"
                            data-confirm-message="Please confirm that you want to delete this photo. It will be removed from the offer gallery."
                            data-confirm-confirm-label="Delete Photo">Delete
                    </button>
                </form>
            </div>
        </article>
    </section>

    <section th:if="${#lists.isEmpty(photos)}" class="empty-state">
        <h2>No Photos Yet</h2>
        <p>Add photos to one of your offers to build your portfolio gallery.</p>
        <a th:href="@{/my-offers}" class="btn btn-primary">Go to My Offers</a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
