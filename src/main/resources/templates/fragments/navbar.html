<nav th:fragment="navbar" class="navbar">
    <div class="container nav-container">
        <a th:href="@{/}" class="logo">LensMarket</a>
        <ul class="nav-links">
            <!-- Authenticated User Links -->
            <li th:if="${session.user_id != null}">
                <a th:href="@{/home}">Home</a>
            </li>

            <!-- Photographer-Only Links -->
            <li th:if="${session.user_id != null && session.user_role == 'PHOTOGRAPHER'}">
                <a th:href="@{/offers}">My Offers</a>
            </li>
            <li th:if="${session.user_id != null && session.user_role == 'PHOTOGRAPHER'}">
                <a th:href="@{/portfolio}">My Photos</a>
            </li>
            <li th:if="${session.user_id != null && session.user_role == 'PHOTOGRAPHER'}">
                <a th:href="@{/dashboard}">Dashboard</a>
            </li>

            <!-- All Authenticated Users -->
            <li th:if="${session.user_id != null}">
                <a th:href="@{/bookings}">Bookings</a>
            </li>
            <li th:if="${session.user_id != null}">
                <a th:href="@{/reviews}">Reviews</a>
            </li>
            <li th:if="${session.user_id != null}">
                <a th:href="@{/profile}">Profile</a>
            </li>

            <!-- Unauthenticated User Links -->
            <li th:if="${session.user_id == null}">
                <a th:href="@{/login}">Login</a>
            </li>
            <li th:if="${session.user_id == null}">
                <a th:href="@{/register}">Register</a>
            </li>

            <li>
                <form  th:if="${session.user_id != null}" th:action="@{/logout}" th:method="post">
                    <button type="submit" class="nav-link-btn">Logout</button>
                </form>
            </li>
        </ul>
    </div>
