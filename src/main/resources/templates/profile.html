<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Profile')}"></head>
    <title>Profile</title>
<body>

<header th:replace="~{fragments/header :: header}"></header>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container">
    <section class="profile-card">

        <div class="profile-avatar">
            <img th:src="${user.profileImageUrl != null ? user.profileImageUrl : '/images/default-avatar.jpg'}" alt="Profile Photo">
        </div>

        <div class="profile-info">
            <h1 th:text="${user.firstName + ' ' + user.lastName}"></h1>
            <p th:text="${user.email}"></p>
            <span class="role-badge" th:text="${user.role}"></span>
        </div>

    </section>

    <section class="form-section">
        <form th:action="@{/profile/update}" th:object="${user}" method="post">

            <div class="form-group">
                <label>First Name</label>
                <input type="text" th:field="*{firstName}">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" th:field="*{lastName}">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>

            <button class="btn-primary" type="submit">Save Changes</button>

        </form>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
