<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Offer Details')}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container">
    <section class="offer-hero">
        <img th:src="${offer.coverPhoto != null ? offer.coverPhoto.imageUrl : 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1200&q=80'}"
             alt="Offer Image">
        <div class="offer-info">
            <h1 th:text="${offer.title}"></h1>
            <div class="offer-meta">
                <span class="location-badge" th:text="${offer.location}"></span>
                <span class="duration-badge" th:text="${offer.durationHours + ' hours'}"></span>
                <span th:class="${offer.available ? 'availability-badge available' : 'availability-badge unavailable'}"
                      th:text="${offer.available ? 'Available' : 'Unavailable'}"></span>
            </div>
            <p class="offer-details-description" th:text="${offer.description}"></p>
            <div class="offer-price" th:text="${offer.price + ' €'}"></div>
            <a class="btn btn-primary book-now-btn"
               th:if="${offer.available and (session.user_id == null or session.user_id != offer.photographer.id)}"
               th:href="@{/bookings/create/{id}(id=${offer.id})}">Book Now</a>
        </div>
    </section>

    <section class="gallery-section" th:if="${!#lists.isEmpty(offer.photos)}">
        <h2>Gallery</h2>
        <div class="photo-grid">
            <img th:each="photo : ${offer.photos}" th:src="${photo.imageUrl}" alt="Portfolio Photo">
        </div>
    </section>

    <section class="reviews-section" th:if="${!#lists.isEmpty(offer.reviews)}">
        <h2>Reviews</h2>
        <div class="review-card" th:each="review : ${offer.reviews}">
            <h3 th:text="${review.author.firstName + ' ' + review.author.lastName}"></h3>
            <div class="rating" th:text="${review.rating + '/5'}"></div>
            <p th:text="${review.comment}"></p>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
