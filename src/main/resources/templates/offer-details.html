<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Offer Details')}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container">
    <section class="offer-hero">
        <img th:src="${offer.coverPhoto != null ? offer.coverPhoto.imageUrl : 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1200&q=80'}"
             referrerpolicy="no-referrer"
             alt="Offer Image">
        <div class="offer-info">
            <h1 th:text="${offer.title}"></h1>
            <div class="offer-meta">
                <span class="location-badge" th:text="${offer.location}"></span>
                <span class="duration-badge" th:text="${offer.durationHours + ' hours'}"></span>
                <span th:class="${offer.available ? 'availability-badge available' : 'availability-badge unavailable'}"
                      th:text="${offer.available ? 'Available' : 'Unavailable'}"></span>
            </div>
            <p class="offer-details-description" th:text="${offer.description}"></p>
            <div class="offer-price" th:text="${offer.price + ' €'}"></div>
            <div class="details-actions offer-details-actions">
                <div class="details-actions-left">
                    <a th:href="@{/offers}" class="btn btn-secondary">Back</a>
                    <a class="btn btn-primary"
                       th:if="${offer.available and (session.user_id == null or session.user_id != offer.photographer.id)}"
                       th:href="@{/bookings/create/{id}(id=${offer.id})}">Book Now</a>
                    <a class="btn btn-primary"
                       th:if="${session.user_id != null && session.user_id == offer.photographer.id}"
                       th:href="@{/photos/create/{offerId}(offerId=${offer.id})}">Add Photo</a>
                </div>
            </div>
        </div>
    </section>

    <section class="gallery-section" th:if="${!#lists.isEmpty(offer.photos)}">
        <div class="section-header">
            <h2>Gallery</h2>
            <a th:href="@{/offers/{id}/photos(id=${offer.id})}" class="btn btn-secondary">View All Photos</a>
        </div>
        <div class="photo-grid">
            <a th:each="photo : ${offer.photos}" th:href="@{/photos/{id}(id=${photo.id}, from='offer-details')}">
                <img th:src="${photo.imageUrl}" referrerpolicy="no-referrer" alt="Portfolio Photo">
            </a>
        </div>
    </section>

    <section class="reviews-section" th:if="${!#lists.isEmpty(offer.reviews)}">
        <div class="section-header">
            <h2>Reviews</h2>
            <a th:href="@{/offers/{id}/reviews(id=${offer.id})}" class="btn btn-secondary">View All Reviews</a>
        </div>
        <div class="review-card" th:each="review : ${offer.reviews}">
            <h3 th:text="${review.author.displayName}"></h3>
            <div class="rating" th:text="${review.rating + '/5'}"></div>
            <p th:text="${review.comment}"></p>
            <span class="review-date" th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}"></span>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
