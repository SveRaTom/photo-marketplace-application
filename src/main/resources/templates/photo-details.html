<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Photo Details')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="details-card photo-details-card">
        <div class="photo-detail-image">
            <img th:src="${photo.imageUrl}" referrerpolicy="no-referrer" alt="Portfolio Photo">
        </div>

        <div class="details-header">
            <h1 th:text="${photo.title != null ? photo.title : 'Untitled Photo'}"></h1>
            <span th:if="${photo.coverPhoto}" class="cover-badge">Cover Photo</span>
        </div>

        <div class="details-content">
            <div class="detail-row">
                <strong>Offer:</strong>
                <a th:href="@{/offers/{id}(id=${photo.offer.id})}" th:text="${photo.offer.title}"></a>
            </div>

            <div class="detail-row">
                <strong>Photographer:</strong>
                <span th:text="${photo.offer.photographer.displayName}"></span>
            </div>

            <div class="detail-row">
                <strong>Created On:</strong>
                <span th:text="${#temporals.format(photo.createdAt, 'dd MMM yyyy HH:mm')}"></span>
            </div>

            <div class="detail-column" th:if="${photo.description != null}">
                <strong>Description:</strong>
                <div class="notes-box" th:text="${photo.description}"></div>
            </div>
        </div>

        <div class="details-actions">
            <div class="details-actions-left">
                <a th:href="${backUrl}" class="btn btn-secondary">Back</a>
                <a th:if="${photo.canEdit}" th:href="@{/photos/edit/{id}(id=${photo.id})}"
                   class="btn btn-warning">Edit Photo</a>

                <form th:if="${photo.canSetAsCover}" th:action="@{/photos/{id}/cover(id=${photo.id})}"
                      th:method="post">
                    <button type="submit" class="btn btn-success">Set as Cover</button>
                </form>
            </div>

            <div class="details-actions-right">
                <form th:if="${photo.canDelete}" th:action="@{/photos/delete/{id}(id=${photo.id})}"
                      th:method="post">
                    <button type="submit" class="btn btn-danger"
                            data-confirm-title="Delete this photo?"
                            data-confirm-message="Please confirm that you want to delete this photo. It will be removed from the offer gallery."
                            data-confirm-confirm-label="Delete Photo">Delete Photo
                    </button>
                </form>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
