<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Offer Photos')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="page-header">
        <div>
            <h1 th:text="${'Photos for ' + offer.title}"></h1>
            <p th:text="${'Photographer: ' + offer.photographer.displayName}"></p>
        </div>
        <div class="page-actions">
            <a th:href="@{/offers/{id}(id=${offer.id})}" class="btn btn-secondary">Back to Offer</a>
            <a th:if="${session.user_id != null && session.user_id == offer.photographer.id}"
               th:href="@{/photos/create/{offerId}(offerId=${offer.id})}" class="btn btn-primary">Add Photo</a>
        </div>
    </section>

    <section class="photos-grid" th:if="${!#lists.isEmpty(photos)}">
        <article class="photo-card" th:each="photo : ${photos}">
            <a th:href="@{/photos/{id}(id=${photo.id})}" class="photo-card-image-link">
                <img th:src="${photo.imageUrl}" referrerpolicy="no-referrer" alt="Portfolio Photo">
            </a>

            <div class="photo-card-content">
                <div class="photo-card-header">
                    <h2 th:text="${photo.title != null ? photo.title : 'Untitled Photo'}"></h2>
                    <span th:if="${photo.coverPhoto}" class="cover-badge">Cover</span>
                </div>
                <p th:if="${photo.description != null}" class="photo-description" th:text="${photo.description}"></p>
            </div>

            <div class="offer-actions">
                <a th:href="@{/photos/{id}(id=${photo.id})}" class="btn btn-primary">Details</a>
                <a th:if="${photo.canEdit}" th:href="@{/photos/edit/{id}(id=${photo.id})}" class="btn btn-warning">Edit</a>

                <form th:if="${photo.canDelete}" class="danger-action"
                      th:action="@{/photos/delete/{id}(id=${photo.id})}" th:method="post">
                    <button type="submit" class="btn btn-danger"
                            data-confirm-title="Delete this photo?"
                            data-confirm-message="Please confirm that you want to delete this photo. It will be removed from the offer gallery."
                            data-confirm-confirm-label="Delete Photo">Delete
                    </button>
                </form>
            </div>
        </article>
    </section>

    <section th:if="${#lists.isEmpty(photos)}" class="empty-state">
        <h2>No Photos Yet</h2>
        <p>This offer does not have portfolio photos yet.</p>
        <a th:if="${session.user_id != null && session.user_id == offer.photographer.id}"
           th:href="@{/photos/create/{offerId}(offerId=${offer.id})}" class="btn btn-primary">Add First Photo</a>
        <a th:if="${session.user_id == null || session.user_id != offer.photographer.id}"
           th:href="@{/offers/{id}(id=${offer.id})}" class="btn btn-primary">Back to Offer</a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
